{% set name = "cpuid" %}
{% set version = "0.1.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/cpuid-{{ version }}.tar.gz
  sha256: fd5fd35fa29ede70de64235c38d0e824290606769b536a4fdf6c5951a989f38a
  patches:
    - 0001-remove-readme.patch

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools
  run:
    - cpuid-native >=0.0.8
    - python >={{ python_min }}

test:
  imports:
    - cpuid
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/fpelliccioni/cpuid-py
  summary: cpuid Pythonic API
  license: MIT
  license_file: LICENSE
extra:
  recipe-maintainers:
    - thewchan
